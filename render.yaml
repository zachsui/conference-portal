# Render Blueprint — deploy the FastAPI backend as a Web Service.
# https://render.com/docs/blueprint-spec
#
# Usage: Dashboard → New → Blueprint → connect this repo → Render reads render.yaml.
# Or create a Web Service manually: Root Directory = backend, same build/start commands.
services:
  - type: web
    name: conference-portal-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
